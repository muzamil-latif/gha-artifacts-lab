name: Environment Variables Practice

on: push

env:
  APP_NAME: gha-artifacts-lab

jobs:
  show-variable:
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: Development

    steps:
      - name: Print App Name
        run: echo $APP_NAME

      - name: Print Environment
        run: echo $ENVIRONMENT

      - name: Print Secret
        run: echo ${{ secrets.MY_NAME }}